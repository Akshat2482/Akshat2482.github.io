<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Tracking</title>
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, #1f2937, #0f172a 45%, #020617);
      --accent: #38bdf8;
      --text: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #start-btn {
      padding: 1rem 2.6rem;
      border: none;
      border-radius: 999px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #0f172a;
      background: linear-gradient(120deg, #a5f3fc, #38bdf8 40%, #0ea5e9);
      box-shadow: 0 18px 45px rgba(14, 165, 233, 0.35);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    #start-btn:hover { transform: translateY(-2px); }
    #start-btn:active { transform: translateY(1px); box-shadow: 0 10px 28px rgba(14,165,233,0.45); }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
    }
    video, canvas {
      position: absolute;
      max-width: 100vw;
      max-height: 100vh;
    }
    #hint {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    #hint.show { opacity: 1; }
  </style>
</head>
<body>
  <button id="start-btn">START</button>

  <div id="stage">
    <video id="video" playsinline style="display:none;"></video>
    <canvas id="overlay"></canvas>
    <div id="hint">Raise your hand for landmarks • Faces show boxes & info</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/human@3.12.0/dist/human.js"></script>
  <script>
    const startBtn = document.getElementById("start-btn");
    const stage = document.getElementById("stage");
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");

    let camera = null;
    let hands = null;
    let human = null;
    let faceDetections = [];
    let smoothedBoxes = [];
    let lastHumanResult = null;

    const CAM_FACING = "environment"; // rear camera
    const CAM_WIDTH = 640;
    const CAM_HEIGHT = 480;
    const MIRROR = CAM_FACING === "user";

    function resizeCanvas() {
      const { videoWidth: w, videoHeight: h } = video;
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = "100vw";
      canvas.style.height = `${(h / w) * 100}vw`;
    }

    function enterFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      return Promise.resolve(); // fallback
    }

    async function startExperience() {
      startBtn.disabled = true;
      initHands();

      try {
        camera = new Camera(video, {
          onFrame: async () => { await hands.send({ image: video }); },
          width: CAM_WIDTH,
          height: CAM_HEIGHT,
          facingMode: CAM_FACING
        });

        await camera.start(); // prompts for camera permission

        stage.style.display = "flex";
        startBtn.style.display = "none";
        hint.classList.add("show");
        await initHuman();
        resizeCanvas();

        try { await enterFullscreen(); } catch (_) { /* fullscreen may be declined */ }

      } catch (err) {
        alert("Camera access failed: " + err.message);
        startBtn.disabled = false;
        stage.style.display = "none";
      }
    }

    function initHands() {
      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, // fastest
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      hands.onResults(onResults);
    }

    async function initHuman() {
      human = new Human({
        modelBasePath: "https://cdn.jsdelivr.net/npm/@vladmandic/human@3.12.0/models",
        backend: "webgl",
        filter: { enabled: true },
        face: {
          enabled: true,
          detector: { rotation: true, maxDetected: 3 },
          mesh: { enabled: false },
          iris: { enabled: false },
          attention: { enabled: false },
          emotion: { enabled: true },
          description: { enabled: true },
          antispoof: { enabled: true },
          liveness: { enabled: true }
        },
        body: { enabled: false },
        hand: { enabled: false },
        gesture: { enabled: false },
        segmentation: { enabled: false }
      });
      await human.load();
      await human.warmup();
      detectFacesLoop();
    }

    async function detectFacesLoop() {
      if (!human || !video.videoWidth) {
        requestAnimationFrame(detectFacesLoop);
        return;
      }
      try {
        const res = await human.detect(video);
        lastHumanResult = res;
        faceDetections = res?.face || [];
        smoothFaceBoxes();
      } catch (_) {
        // ignore detection errors to keep loop alive
      }
      requestAnimationFrame(detectFacesLoop);
    }

    function smoothFaceBoxes() {
      const alpha = 0.25; // smoothing factor
      smoothedBoxes.length = faceDetections.length;
      for (let i = 0; i < faceDetections.length; i++) {
        const box = faceDetections[i].box;
        if (!box) continue;
        const prev = smoothedBoxes[i] || { x: box[0], y: box[1], w: box[2], h: box[3] };
        const next = {
          x: prev.x + (box[0] - prev.x) * alpha,
          y: prev.y + (box[1] - prev.y) * alpha,
          w: prev.w + (box[2] - prev.w) * alpha,
          h: prev.h + (box[3] - prev.h) * alpha,
        };
        smoothedBoxes[i] = next;
      }
    }

    function onResults(results) {
      if (!canvas.width || !canvas.height) resizeCanvas();

      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (MIRROR) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      if (results.multiHandLandmarks) {
        ctx.save();
        if (MIRROR) {
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        for (const landmarks of results.multiHandLandmarks) {
          drawHand(ctx, landmarks);
        }
        drawFaces(ctx);
        ctx.restore();
      }
    }

    function drawHand(ctx, landmarks) {
      // Style presets
      const tipRadius = 7;
      const jointRadius = 4;
      const glow = "#7dd3fc";

      // Blue silhouette (inspired by the reference hand)
      drawSilhouette(ctx, landmarks);

      // Connector stroke with gradient and glow
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.shadowColor = glow;
      ctx.shadowBlur = 12;
      ctx.lineWidth = 6;

      // Draw each connection
      for (const [start, end] of HAND_CONNECTIONS) {
        const s = landmarks[start];
        const e = landmarks[end];
        const gx = canvas.width * (s.x + e.x) * 0.5;
        const gy = canvas.height * (s.y + e.y) * 0.5;
        const grad = ctx.createLinearGradient(s.x * canvas.width, s.y * canvas.height, e.x * canvas.width, e.y * canvas.height);
        grad.addColorStop(0, "#22d3ee");
        grad.addColorStop(1, "#0ea5e9");
        ctx.strokeStyle = grad;
        ctx.beginPath();
        ctx.moveTo(s.x * canvas.width, s.y * canvas.height);
        ctx.lineTo(e.x * canvas.width, e.y * canvas.height);
        ctx.stroke();
      }
      ctx.restore();

      // Aim line from index finger (Vision Pro–style)
      drawAimLine(ctx, landmarks);

      // Draw joints
      for (let i = 0; i < landmarks.length; i++) {
        const { x, y, z } = landmarks[i];
        const isTip = [4, 8, 12, 16, 20].includes(i);
        const r = isTip ? tipRadius : jointRadius;
        const px = x * canvas.width;
        const py = y * canvas.height;

        const radial = ctx.createRadialGradient(px, py, 0, px, py, r * 1.3);
        radial.addColorStop(0, "rgba(255,255,255,0.95)");
        radial.addColorStop(1, isTip ? "rgba(34,211,238,0.8)" : "rgba(56,189,248,0.7)");

        ctx.save();
        ctx.shadowColor = glow;
        ctx.shadowBlur = isTip ? 18 : 8;
        ctx.fillStyle = radial;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawAimLine(ctx, landmarks) {
      const base = landmarks[5]; // index mcp
      const tip = landmarks[8];  // index tip
      if (!base || !tip) return;

      const bx = base.x * canvas.width;
      const by = base.y * canvas.height;
      const tx = tip.x * canvas.width;
      const ty = tip.y * canvas.height;

      const dx = tx - bx;
      const dy = ty - by;
      const len2 = dx * dx + dy * dy;
      if (len2 < 1e-6) return;

      // Find intersection with canvas bounds
      const tVals = [];
      if (dx > 0) tVals.push((canvas.width - bx) / dx);
      if (dx < 0) tVals.push(-bx / dx);
      if (dy > 0) tVals.push((canvas.height - by) / dy);
      if (dy < 0) tVals.push(-by / dy);
      const t = Math.min(...tVals.filter(v => v > 0));
      if (!isFinite(t)) return;

      const ex = bx + dx * t;
      const ey = by + dy * t;

      ctx.save();
      ctx.lineWidth = 3;
      ctx.shadowColor = "#38bdf8";
      ctx.shadowBlur = 18;

      const grad = ctx.createLinearGradient(bx, by, ex, ey);
      grad.addColorStop(0, "rgba(34,211,238,0.65)");
      grad.addColorStop(1, "rgba(14,165,233,0.25)");
      ctx.strokeStyle = grad;

      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      // End cap / pointer dot
      const dot = ctx.createRadialGradient(ex, ey, 0, ex, ey, 10);
      dot.addColorStop(0, "rgba(255,255,255,0.95)");
      dot.addColorStop(1, "rgba(14,165,233,0.4)");
      ctx.fillStyle = dot;
      ctx.beginPath();
      ctx.arc(ex, ey, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Simple convex-hull silhouette for a soft, realistic hand mass
    function drawSilhouette(ctx, landmarks) {
      if (!landmarks || landmarks.length === 0) return;

      const points = landmarks.map(p => ({ x: p.x * canvas.width, y: p.y * canvas.height }));
      const hull = convexHull(points);
      if (hull.length < 3) return;

      const grad = ctx.createRadialGradient(
        canvas.width * 0.45, canvas.height * 0.45, 10,
        canvas.width * 0.45, canvas.height * 0.45, Math.max(canvas.width, canvas.height) * 0.6
      );
      grad.addColorStop(0, "rgba(56,189,248,0.35)");
      grad.addColorStop(1, "rgba(14,116,144,0.05)");

      ctx.save();
      ctx.fillStyle = grad;
      ctx.shadowColor = "#22d3ee";
      ctx.shadowBlur = 25;

      ctx.beginPath();
      ctx.moveTo(hull[0].x, hull[0].y);
      for (let i = 1; i < hull.length; i++) {
        ctx.lineTo(hull[i].x, hull[i].y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawFaces(ctx) {
      if (!faceDetections || !faceDetections.length) return;
      ctx.save();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(14,165,233,0.8)";
      ctx.fillStyle = "rgba(14,165,233,0.18)";
      ctx.font = "16px Segoe UI";
      ctx.textBaseline = "top";
      for (let i = 0; i < faceDetections.length; i++) {
        const face = faceDetections[i];
        const smooth = smoothedBoxes[i];
        const box = smooth || face.box;
        if (!box) continue;
        const x = box.x ?? box[0];
        const y = box.y ?? box[1];
        const w = box.w ?? box[2];
        const h = box.h ?? box[3];
        const cx = x + w * 0.5;
        const cy = y + h * 0.5;
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e0f2fe";
        const emotion = face.emotion?.[0]?.emotion;
        const emoScore = face.emotion?.[0]?.score;
        const gender = face.gender;
        const age = face.age ? Math.round(face.age) : undefined;
        const label = [
          `face ${(face.score?.toFixed?.(2) || "")}`,
          gender ? `gender:${gender} ${(face.genderScore?.toFixed?.(2) || "")}` : null,
          age ? `age:${age}` : null,
          emotion ? `${emotion}:${emoScore?.toFixed?.(2)}` : null,
        ].filter(Boolean).join(" | ");
        ctx.fillText(label, x + 6, y + 6);
        ctx.fillStyle = "rgba(14,165,233,0.18)";

        // Orientation lines (yaw, pitch, roll) in orange
        const rot = face.rotation || {};
        const len = Math.min(w, h) * 0.35;
        ctx.strokeStyle = "#f97316";
        ctx.lineWidth = 3;
        ctx.beginPath(); // yaw (left/right)
        const yawX = cx + Math.sin(rot.yaw || 0) * len;
        ctx.moveTo(cx, cy);
        ctx.lineTo(yawX, cy);
        ctx.stroke();

        ctx.beginPath(); // pitch (up/down)
        const pitchY = cy - Math.sin(rot.pitch || 0) * len;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx, pitchY);
        ctx.stroke();

        ctx.beginPath(); // roll (tilt)
        const roll = rot.roll || 0;
        const rx = Math.cos(roll) * len * 0.6;
        const ry = Math.sin(roll) * len * 0.6;
        ctx.moveTo(cx - rx, cy - ry);
        ctx.lineTo(cx + rx, cy + ry);
        ctx.stroke();

        ctx.fillStyle = "#f97316";
        ctx.fillText(
          `yaw:${deg(rot.yaw)} pitch:${deg(rot.pitch)} roll:${deg(rot.roll)}`,
          x + 6,
          y + 26
        );
      }
      ctx.restore();
    }

    function deg(rad) {
      if (rad === undefined || rad === null) return "--";
      return (rad * 57.2958).toFixed(0);
    }

    // Monotonic chain convex hull
    function convexHull(points) {
      if (points.length <= 3) return points.slice();
      const pts = points.slice().sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);
      const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
      const lower = [];
      for (const p of pts) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
          lower.pop();
        }
        lower.push(p);
      }
      const upper = [];
      for (let i = pts.length - 1; i >= 0; i--) {
        const p = pts[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
          upper.pop();
        }
        upper.push(p);
      }
      upper.pop();
      lower.pop();
      return lower.concat(upper);
    }

    startBtn.addEventListener("click", startExperience);
    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
