<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Tracking</title>
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, #1f2937, #0f172a 45%, #020617);
      --accent: #38bdf8;
      --text: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #start-btn {
      padding: 1rem 2.6rem;
      border: none;
      border-radius: 999px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #0f172a;
      background: linear-gradient(120deg, #a5f3fc, #38bdf8 40%, #0ea5e9);
      box-shadow: 0 18px 45px rgba(14, 165, 233, 0.35);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    #start-btn:hover { transform: translateY(-2px); }
    #start-btn:active { transform: translateY(1px); box-shadow: 0 10px 28px rgba(14,165,233,0.45); }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
    }
    video, canvas {
      position: absolute;
      max-width: 100vw;
      max-height: 100vh;
    }
    #hint {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    #hint.show { opacity: 1; }
  </style>
</head>
<body>
  <button id="start-btn">START</button>

  <div id="stage">
    <video id="video" playsinline style="display:none;"></video>
    <canvas id="overlay"></canvas>
    <div id="hint">Raise your hand to see landmarks</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
  <script>
    const startBtn = document.getElementById("start-btn");
    const stage = document.getElementById("stage");
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");

    let camera = null;
    let hands = null;

    const CAM_FACING = "environment"; // rear camera
    const CAM_WIDTH = 1280;
    const CAM_HEIGHT = 720;
    const MIRROR = CAM_FACING === "user";

    function resizeCanvas() {
      const { videoWidth: w, videoHeight: h } = video;
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = "100vw";
      canvas.style.height = `${(h / w) * 100}vw`;
    }

    function enterFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      return Promise.resolve(); // fallback
    }

    async function startExperience() {
      startBtn.disabled = true;
      initHands();

      try {
        camera = new Camera(video, {
          onFrame: async () => { await hands.send({ image: video }); },
          width: CAM_WIDTH,
          height: CAM_HEIGHT,
          facingMode: CAM_FACING
        });

        await camera.start(); // prompts for camera permission

        stage.style.display = "flex";
        startBtn.style.display = "none";
        hint.classList.add("show");
        resizeCanvas();

        try { await enterFullscreen(); } catch (_) { /* fullscreen may be declined */ }

      } catch (err) {
        alert("Camera access failed: " + err.message);
        startBtn.disabled = false;
        stage.style.display = "none";
      }
    }

    function initHands() {
      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.6
      });
      hands.onResults(onResults);
    }

    function onResults(results) {
      if (!canvas.width || !canvas.height) resizeCanvas();

      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (MIRROR) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      if (results.multiHandLandmarks) {
        ctx.save();
        if (MIRROR) {
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: "#38bdf8", lineWidth: 4 });
          drawLandmarks(ctx, landmarks, { color: "#e0f2fe", lineWidth: 2, radius: 4 });
        }
        ctx.restore();
      }
    }

    startBtn.addEventListener("click", startExperience);
    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
