<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Mobile AR Hand Cube</title>
  <style>
    :root {
      --bg: #08111d;
      --panel: rgba(7, 17, 30, 0.74);
      --border: rgba(120, 202, 255, 0.28);
      --text: #e8f6ff;
      --muted: #9bc7e7;
      --accent: #53beff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      touch-action: none;
    }

    #cameraFeed,
    #sceneCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #cameraFeed {
      z-index: 0;
      background: #000;
    }

    #sceneCanvas {
      z-index: 1;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
    }

    .panel {
      max-width: 320px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 0 32px rgba(22, 89, 170, 0.22);
      pointer-events: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    #status {
      margin-top: 10px;
      color: var(--accent);
      font-size: 12px;
      min-height: 16px;
    }

    #hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

  </style>
</head>
<body>
  <video id="cameraFeed" playsinline muted autoplay></video>
  <canvas id="sceneCanvas"></canvas>

  <div id="ui">
    <div class="panel">
      <h1>AR Hologram Cube</h1>
      <p>
        Point your phone around the room. Make a fist near the cube to grab it,
        then open your hand to release or throw it.
      </p>
      <div id="status">Starting AR...</div>
      <div id="hint">Open on HTTPS or localhost. If motion tracking stays off, tap anywhere once.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
  <script>
    const video = document.getElementById("cameraFeed");
    const canvas = document.getElementById("sceneCanvas");
    const statusEl = document.getElementById("status");

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      powerPreference: "high-performance",
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 50);
    camera.position.set(0, 0, 0);

    const clock = new THREE.Clock();
    const gravity = new THREE.Vector3(0, -2.8, 0);
    const tempVec = new THREE.Vector3();
    const tempVec2 = new THREE.Vector3();
    const targetCameraQuat = new THREE.Quaternion();
    const handTargetWorld = new THREE.Vector3();
    const grabOffset = new THREE.Vector3();
    const handMarkerTarget = new THREE.Vector3();
    const deviceEuler = new THREE.Euler();
    const zee = new THREE.Vector3(0, 0, 1);
    const q0 = new THREE.Quaternion();
    const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

    let hands;
    let mediapipeCamera;
    let screenOrientation = 0;
    let sensorReady = false;
    let started = false;
    let motionTapRetryNeeded = false;
    let handVisible = false;
    let handClosed = false;
    let grabbing = false;
    let lastGrabState = false;
    let interactionPlaneDistance = 2;
    let lastHandTime = 0;
    let handVelocityWorld = new THREE.Vector3();
    const handVelocityHistory = [];
    const floorY = -1.25;

    const cubeState = {
      velocity: new THREE.Vector3(0, 0, 0),
      held: false,
    };

    const hemi = new THREE.HemisphereLight(0x8ed7ff, 0x08111d, 1.5);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0x80d8ff, 1.8);
    dir.position.set(2, 3, 1.5);
    scene.add(dir);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.ShadowMaterial({ opacity: 0.1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = floorY;
    scene.add(floor);

    const floorGrid = new THREE.GridHelper(20, 20, 0x2d74aa, 0x12304e);
    floorGrid.position.y = floorY + 0.001;
    floorGrid.material.transparent = true;
    floorGrid.material.opacity = 0.22;
    scene.add(floorGrid);

    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.34, 0.34, 0.34),
      new THREE.MeshPhysicalMaterial({
        color: 0x2a8cff,
        transparent: true,
        opacity: 0.4,
        transmission: 0.35,
        roughness: 0.12,
        metalness: 0.05,
        emissive: 0x2b9fff,
        emissiveIntensity: 1.3,
      })
    );
    cubeGroup.add(cube);

    const cubeGlow = new THREE.Mesh(
      new THREE.BoxGeometry(0.42, 0.42, 0.42),
      new THREE.MeshBasicMaterial({
        color: 0x59c8ff,
        transparent: true,
        opacity: 0.12,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    );
    cubeGroup.add(cubeGlow);

    const cubeEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(0.36, 0.36, 0.36)),
      new THREE.LineBasicMaterial({
        color: 0xa7edff,
        transparent: true,
        opacity: 0.8,
      })
    );
    cubeGroup.add(cubeEdges);

    cubeGroup.position.set(0, 0.05, -2);

    const handMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 18, 18),
      new THREE.MeshBasicMaterial({
        color: 0x89ddff,
        transparent: true,
        opacity: 0.75,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    );
    handMarker.visible = false;
    scene.add(handMarker);

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    }

    function setObjectQuaternion(quaternion, alpha, beta, gamma, orient) {
      deviceEuler.set(beta, alpha, -gamma, "YXZ");
      quaternion.setFromEuler(deviceEuler);
      quaternion.multiply(q1);
      quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
    }

    function updateCameraOrientation() {
      if (!sensorReady) return;
      camera.quaternion.slerp(targetCameraQuat, 0.22);
    }

    function handleDeviceOrientation(event) {
      if (event.alpha == null || event.beta == null || event.gamma == null) {
        return;
      }

      const alpha = THREE.MathUtils.degToRad(event.alpha);
      const beta = THREE.MathUtils.degToRad(event.beta);
      const gamma = THREE.MathUtils.degToRad(event.gamma);
      const orient = THREE.MathUtils.degToRad(screenOrientation || 0);
      setObjectQuaternion(targetCameraQuat, alpha, beta, gamma, orient);
      sensorReady = true;
    }

    function updateScreenOrientation() {
      if (window.screen.orientation && typeof window.screen.orientation.angle === "number") {
        screenOrientation = window.screen.orientation.angle;
      } else {
        screenOrientation = window.orientation || 0;
      }
    }

    function averageHandPoint(landmarks, indices) {
      let x = 0;
      let y = 0;
      let z = 0;
      for (const index of indices) {
        x += landmarks[index].x;
        y += landmarks[index].y;
        z += landmarks[index].z;
      }
      const count = indices.length;
      return {
        x: x / count,
        y: y / count,
        z: z / count,
      };
    }

    function handIsClosed(landmarks) {
      const palm = averageHandPoint(landmarks, [0, 5, 9, 17]);
      const tips = [8, 12, 16, 20];
      let totalDistance = 0;

      for (const index of tips) {
        const dx = landmarks[index].x - palm.x;
        const dy = landmarks[index].y - palm.y;
        totalDistance += Math.hypot(dx, dy);
      }

      const averageDistance = totalDistance / tips.length;
      return averageDistance < 0.16;
    }

    function planeWorldPointFromNormalized(nx, ny, distance) {
      const fov = THREE.MathUtils.degToRad(camera.fov);
      const halfHeight = Math.tan(fov * 0.5) * distance;
      const halfWidth = halfHeight * camera.aspect;
      const x = (nx * 2 - 1) * halfWidth;
      const y = (0.5 - ny) * 2 * halfHeight;

      tempVec.set(x, y, -distance);
      tempVec.applyQuaternion(camera.quaternion);
      tempVec.add(camera.position);
      return tempVec;
    }

    function pushHandVelocitySample(position, timestamp) {
      handVelocityHistory.push({
        time: timestamp,
        position: position.clone(),
      });

      while (handVelocityHistory.length > 6) {
        handVelocityHistory.shift();
      }

      if (handVelocityHistory.length < 2) return;

      const first = handVelocityHistory[0];
      const last = handVelocityHistory[handVelocityHistory.length - 1];
      const dt = Math.max((last.time - first.time) / 1000, 0.001);
      handVelocityWorld.copy(last.position).sub(first.position).divideScalar(dt);
    }

    function clearHandVelocity() {
      handVelocityHistory.length = 0;
      handVelocityWorld.set(0, 0, 0);
    }

    function beginGrab() {
      grabbing = true;
      cubeState.held = true;
      cubeState.velocity.set(0, 0, 0);
      grabOffset.copy(cubeGroup.position).sub(handTargetWorld);
      setStatus("Grabbed cube.");
    }

    function releaseGrab() {
      grabbing = false;
      cubeState.held = false;
      cubeState.velocity.copy(handVelocityWorld).multiplyScalar(0.26);
      setStatus("Released cube.");
    }

    function updateCubePhysics(dt) {
      if (cubeState.held) {
        tempVec2.copy(handTargetWorld).add(grabOffset);
        cubeGroup.position.lerp(tempVec2, 0.28);

        const latest = handVelocityHistory[handVelocityHistory.length - 1];
        if (latest) {
          cubeState.velocity.copy(handVelocityWorld);
        }
        return;
      }

      cubeState.velocity.addScaledVector(gravity, dt);
      cubeState.velocity.multiplyScalar(0.995);
      cubeGroup.position.addScaledVector(cubeState.velocity, dt);

      const halfSize = 0.17;
      if (cubeGroup.position.y - halfSize < floorY) {
        cubeGroup.position.y = floorY + halfSize;
        if (cubeState.velocity.y < 0) {
          cubeState.velocity.y *= -0.32;
          cubeState.velocity.x *= 0.8;
          cubeState.velocity.z *= 0.8;
        }
      }

      if (cubeGroup.position.y <= floorY + halfSize + 0.002) {
        cubeState.velocity.x *= 0.985;
        cubeState.velocity.z *= 0.985;
        if (Math.abs(cubeState.velocity.y) < 0.03) {
          cubeState.velocity.y = 0;
        }
      }
    }

    function onHandsResults(results) {
      handVisible = false;
      handMarker.visible = false;

      if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
        if (grabbing) {
          releaseGrab();
        }
        clearHandVelocity();
        return;
      }

      const landmarks = results.multiHandLandmarks[0];
      const palmCenter = averageHandPoint(landmarks, [0, 5, 9, 17]);
      const palmWidth = Math.hypot(
        landmarks[5].x - landmarks[17].x,
        landmarks[5].y - landmarks[17].y
      );

      interactionPlaneDistance = THREE.MathUtils.clamp(1.25 + (0.22 / Math.max(palmWidth, 0.08)), 1.4, 2.6);
      planeWorldPointFromNormalized(palmCenter.x, palmCenter.y, interactionPlaneDistance);
      handTargetWorld.copy(tempVec);
      handMarkerTarget.copy(handTargetWorld);
      handVisible = true;
      handClosed = handIsClosed(landmarks);
      lastHandTime = performance.now();
      pushHandVelocitySample(handTargetWorld, lastHandTime);

      const distanceToCube = handTargetWorld.distanceTo(cubeGroup.position);
      const nearCube = distanceToCube < 0.45;

      if (handClosed && !lastGrabState && nearCube && !grabbing) {
        beginGrab();
      }

      if (!handClosed && lastGrabState && grabbing) {
        releaseGrab();
      }

      lastGrabState = handClosed;
    }

    async function requestMotionPermission() {
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response !== "granted") {
          throw new Error("Motion permission denied.");
        }
      }
    }

    function enableOrientationListener() {
      window.addEventListener("deviceorientation", handleDeviceOrientation, true);
      window.addEventListener("orientationchange", updateScreenOrientation);
      if (window.screen.orientation) {
        window.screen.orientation.addEventListener("change", updateScreenOrientation);
      }
    }

    async function startCameraAndTracking() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("Camera API unavailable. Open this page in a mobile browser over HTTPS.");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
      });

      video.srcObject = stream;
      await video.play();

      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.6,
      });
      hands.onResults(onHandsResults);

      mediapipeCamera = new Camera(video, {
        width: 640,
        height: 360,
        onFrame: async () => {
          await hands.send({ image: video });
        },
      });

      mediapipeCamera.start();
    }

    async function startExperience() {
      if (started) {
        return;
      }

      started = true;
      setStatus("Requesting camera access...");

      try {
        updateScreenOrientation();
        enableOrientationListener();

        try {
          await requestMotionPermission();
          motionTapRetryNeeded = false;
        } catch (motionError) {
          motionTapRetryNeeded = true;
          setStatus("Camera starting. Tap anywhere once if motion tracking is blocked.");
        }

        await startCameraAndTracking();
        if (sensorReady) {
          setStatus("Move the phone and bring one hand into view.");
        } else {
          setStatus("Camera is live. Tap anywhere once to enable motion tracking if needed.");
        }
      } catch (error) {
        started = false;
        setStatus(error.message || "Unable to start AR.");
      }
    }

    async function tryEnableMotionFromGesture() {
      if (sensorReady || !started || !motionTapRetryNeeded) {
        return;
      }

      try {
        await requestMotionPermission();
        motionTapRetryNeeded = false;
        setStatus("Motion tracking enabled.");
      } catch (error) {
        setStatus(error.message || "Motion permission blocked.");
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      updateCameraOrientation();
      updateCubePhysics(dt);

      cube.rotation.x += dt * 0.45;
      cube.rotation.y += dt * 0.7;
      cubeGlow.rotation.x = cube.rotation.x * 0.8;
      cubeGlow.rotation.y = cube.rotation.y * 0.8;
      cubeEdges.rotation.copy(cube.rotation);

      if (handVisible) {
        handMarker.visible = true;
        handMarker.position.lerp(handMarkerTarget, 0.35);
        handMarker.scale.setScalar(handClosed ? 0.8 : 1.0);
      } else {
        handMarker.visible = false;
      }

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("load", startExperience);
    document.body.addEventListener("click", tryEnableMotionFromGesture, { passive: true });
    document.body.addEventListener("touchend", tryEnableMotionFromGesture, { passive: true });
    resize();
    animate();
  </script>
</body>
</html>
